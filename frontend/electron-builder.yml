# =============================================================================
# PROJECT SEVEN — electron-builder configuration
# Version: 2.0 (Phase 7 — Professional Installer)
# =============================================================================

appId: com.sevenlabs.seven
productName: SEVEN
copyright: "Copyright © 2025 Seven Labs. All rights reserved."

# ── Output directory ──
directories:
  output: dist-electron
  buildResources: electron

# ── Files to pack into the Electron app ──
files:
  - electron/**/*
  - frontend/dist/**/*
  - "!**/*.pyc"
  - "!**/__pycache__"
  - "!.git"
  - "!node_modules"
  - "!venv"
  - "!dist-electron"

# ── Extra resources (Python source + runtime) ──
# These go into resources/app/ in the packaged build
extraResources:
  - from: "."
    to: "app"
    filter:
      - "*.py"
      - "requirements.txt"
      - "config.json"
      - "backend/**/*"
      - "ears/**/*"
      - "hands/**/*"
      - "knowledge/**/*"
      - "memory/**/*"
      - "mouth/**/*"
      - "web/**/*"
      - "!**/*.pyc"
      - "!**/__pycache__"
  # Embedded Python runtime (built by scripts/prepare-python.js)
  - from: "python-dist/python"
    to: "app/python"
    filter:
      - "**/*"

# ── Windows target ──
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: electron/icon.ico
  # Publisher shown in Windows security dialog
  publisherName: "Seven Labs"
  # Request user-level install (no UAC for app itself)
  requestedExecutionLevel: asInvoker

# ── NSIS Installer configuration ──
nsis:
  # Not one-click — user sees the installer screens
  oneClick: false

  # Allow changing install directory
  allowToChangeInstallationDirectory: true

  # Elevation for install directory write access
  allowElevation: true

  # Shortcuts
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: SEVEN

  # Per-user install (no admin required)
  perMachine: false

  # Icons
  installerIcon: electron/icon.ico
  uninstallerIcon: electron/icon.ico
  installerHeaderIcon: electron/icon.ico

  # License agreement screen
  license: LICENSE.txt

  # Custom NSIS script for branding + uninstall dialog
  include: installer/seven.nsh

  # Installer language
  language: English

  # Delete app directory on uninstall
  deleteAppDataOnUninstall: false