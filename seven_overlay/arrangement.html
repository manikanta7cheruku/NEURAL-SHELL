<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="dark">
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 400px;
    height: 220px;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, 'Segoe UI Variable Display', 'SF Pro Display',
                 'Segoe UI', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .card {
    position: fixed;
    top: 0;
    left: 0;
    width: 400px;
    height: 220px;
    background: transparent;
    border-bottom-left-radius: 14px;
    border-bottom-right-radius: 14px;
    padding: 12px 14px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transform: translateY(-100%);
    opacity: 0;
    will-change: transform, opacity;
  }

  .card.show {
    animation: slideDown 0.55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .card.hiding {
    animation: slideUp 0.22s cubic-bezier(0.65, 0, 0.85, 0.35) forwards;
  }

  @keyframes slideDown {
    0%   { transform: translateY(-100%); opacity: 0; }
    100% { transform: translateY(0);     opacity: 1; }
  }

  @keyframes slideUp {
    0%   { transform: translateY(0);     opacity: 1; }
    100% { transform: translateY(-100%); opacity: 0; }
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header-label {
    font-size: 8.5px;
    font-weight: 600;
    color: rgba(255,255,255,0.38);
    text-transform: uppercase;
    letter-spacing: 0.13em;
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
  }

  .win-count {
    font-size: 8.5px;
    font-weight: 500;
    color: rgba(180,145,255,0.7);
    letter-spacing: 0.04em;
  }

  /* ── Layout grid — scrollable ── */
  .snap-grid {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: none;
    -ms-overflow-style: none;
    padding-right: 2px;
  }

  .snap-grid::-webkit-scrollbar { display: none; }

  .snap-row {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
    height: 46px;
  }

  /* ── Each layout card ── */
  .snap-card {
    flex: 1;
    border-radius: 8px;
    background: rgba(255,255,255,0.055);
    border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 6px 6px 5px;
    transition:
      background 0.18s ease,
      border-color 0.18s ease,
      transform 0.14s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
    height: 100%;
  }

  .snap-card.full { flex: 1; }

  .snap-card:hover {
    background: rgba(150, 110, 255, 0.18);
    border-color: rgba(180, 145, 255, 0.5);
    transform: translateY(-1px);
  }

  .snap-card:active {
    transform: scale(0.96);
    transition-duration: 0.07s;
  }

  /* ── Zone preview SVG ── */
  .snap-preview {
    width: 100%;
    flex: 1;
    display: block;
    overflow: visible;
    min-height: 0;
  }

  .zone {
    fill: rgba(255,255,255,0.12);
    transition: fill 0.18s ease;
  }

  .zone-num {
    fill: rgba(255,255,255,0.55);
    font-size: 8px;
    font-weight: 700;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    pointer-events: none;
    transition: fill 0.18s ease;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  }

  .snap-card:hover .zone-num {
    fill: rgba(255,255,255,0.95);
  }

  .snap-card:hover .zone {
    fill: rgba(180, 145, 255, 0.55);
  }

  .snap-card:hover .zone-accent {
    fill: rgba(200, 170, 255, 0.85);
  }

  /* ── Layout name label ── */
  .snap-label {
    font-size: 8.5px;
    font-weight: 500;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.04em;
    text-shadow: 0 1px 2px rgba(0,0,0,0.35);
    transition: color 0.18s ease;
    white-space: nowrap;
    flex-shrink: 0;
    line-height: 1;
  }

  .snap-card:hover .snap-label {
    color: rgba(210,185,255,0.95);
  }

  .snap-card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 8px;
    background: linear-gradient(
      135deg,
      rgba(180,145,255,0.08) 0%,
      transparent 60%
    );
    opacity: 0;
    transition: opacity 0.18s ease;
    pointer-events: none;
  }

  .snap-card:hover::after { opacity: 1; }
</style>
</head>
<body>

<div class="card" id="card">

  <div class="header">
    <span class="header-label">Arrange Windows</span>
    <span class="win-count" id="winCount"></span>
  </div>

  <div class="snap-grid">

    <!-- Row 1: Maximize (full width) -->
    <div class="snap-row">
      <div class="snap-card full" onclick="pick('maximize')">
        <svg class="snap-preview" viewBox="0 0 120 44" xmlns="http://www.w3.org/2000/svg">
          <rect class="zone zone-accent" x="2" y="2" width="116" height="40" rx="3"/>
        </svg>
        <span class="snap-label">Maximize</span>
      </div>
    </div>

    <!-- Row 2: Split Vertical | Split Horizontal -->
    <div class="snap-row">

      <div class="snap-card" onclick="pick('split_vertical')">
        <svg class="snap-preview" viewBox="0 0 120 44" xmlns="http://www.w3.org/2000/svg">
          <rect class="zone" x="2"  y="2" width="55" height="40" rx="3"/>
          <rect class="zone" x="63" y="2" width="55" height="40" rx="3"/>
          <text x="29.5" y="26" text-anchor="middle" class="zone-num">1</text>
          <text x="90.5" y="26" text-anchor="middle" class="zone-num">2</text>
        </svg>
        <span class="snap-label">Split Vertical</span>
      </div>

      <div class="snap-card" onclick="pick('split_horizontal')">
        <svg class="snap-preview" viewBox="0 0 120 44" xmlns="http://www.w3.org/2000/svg">
          <rect class="zone" x="2" y="2"  width="116" height="18" rx="3"/>
          <rect class="zone" x="2" y="24" width="116" height="18" rx="3"/>
          <text x="60" y="14" text-anchor="middle" class="zone-num">1</text>
          <text x="60" y="36" text-anchor="middle" class="zone-num">2</text>
        </svg>
        <span class="snap-label">Split Horizontal</span>
      </div>

    </div>

    <!-- Row 3: Grid | Stack -->
    <div class="snap-row">

      <div class="snap-card" onclick="pick('grid')">
        <svg class="snap-preview" viewBox="0 0 120 44" xmlns="http://www.w3.org/2000/svg">
          <rect class="zone" x="2"  y="2"  width="55" height="18" rx="3"/>
          <rect class="zone" x="63" y="2"  width="55" height="18" rx="3"/>
          <rect class="zone" x="2"  y="24" width="55" height="18" rx="3"/>
          <rect class="zone" x="63" y="24" width="55" height="18" rx="3"/>
          <text x="29.5" y="14" text-anchor="middle" class="zone-num">1</text>
          <text x="90.5" y="14" text-anchor="middle" class="zone-num">2</text>
          <text x="29.5" y="36" text-anchor="middle" class="zone-num">3</text>
          <text x="90.5" y="36" text-anchor="middle" class="zone-num">4</text>
        </svg>
        <span class="snap-label">Grid</span>
      </div>

      <div class="snap-card" onclick="pick('stack')">
        <svg class="snap-preview" viewBox="0 0 120 44" xmlns="http://www.w3.org/2000/svg">
          <rect class="zone" x="2" y="2"  width="116" height="18" rx="3"/>
          <rect class="zone" x="2" y="24" width="116" height="18" rx="3"/>
          <text x="60" y="14" text-anchor="middle" class="zone-num">1</text>
          <text x="60" y="36" text-anchor="middle" class="zone-num">2</text>
        </svg>
        <span class="snap-label">Stack</span>
      </div>

    </div>

  </div>

</div>

<script>
  let _windows    = [];
  let _allWindows = [];
  let _dismissTimer = null;

  function applyData(data) {
    _windows    = data.windows    || [];
    _allWindows = data.allWindows || [];

    const total = _windows.length;
    const countEl = document.getElementById('winCount');
    countEl.textContent = total > 0
      ? `${total} window${total !== 1 ? 's' : ''}`
      : '';

    const card = document.getElementById('card');
    card.classList.remove('show', 'hiding');
    void card.offsetWidth;
    card.classList.add('show');

    if (_dismissTimer) clearTimeout(_dismissTimer);
    _dismissTimer = setTimeout(retract, 15000);
  }

  window.__applyArrangementData = applyData;

  function pick(layout) {
    if (_dismissTimer) { clearTimeout(_dismissTimer); _dismissTimer = null; }

    const triggered = _windows.filter(w => w.triggered);
    const hwnd_list = triggered.length > 0
      ? triggered.map(w => w.hwnd)
      : _windows.map(w => w.hwnd);

    const all = [..._windows, ..._allWindows];
    const selectedSet = new Set(hwnd_list);
    const minimize_hwnds = all
      .map(w => w.hwnd)
      .filter(h => !selectedSet.has(h));

    const payload = {
      layout,
      hwnd_list,
      minimize_hwnds: [...new Set(minimize_hwnds)],
    };

    // Fire IPC to main process (fire-and-forget). Main handles
    // routing to backend or spawning Python directly.
    try {
      if (window.electronAPI && window.electronAPI.applyLayout) {
        window.electronAPI.applyLayout(payload);
      }
    } catch (e) {
      console.error('applyLayout failed:', e);
    }

    // Dismiss instantly — main process handles arrangement in background
    retract();
  }

  function retract() {
    if (_dismissTimer) { clearTimeout(_dismissTimer); _dismissTimer = null; }
    const card = document.getElementById('card');
    if (card.classList.contains('hiding')) return;
    card.classList.remove('show');
    card.classList.add('hiding');
    setTimeout(() => {
      if (window.electronAPI && window.electronAPI.close) {
        window.electronAPI.close();
      }
    }, 220);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') retract();
  });
</script>
</body>
</html>
