<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="dark">
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 340px;
    height: 140px;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, 'Segoe UI Variable Display', 'SF Pro Display',
                 'Segoe UI', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .card {
    position: fixed;
    top: 0;
    left: 0;
    width: 340px;
    height: 140px;

    background: transparent;

    border-bottom-left-radius: 12px;
    border-bottom-right-radius: 12px;

    padding: 14px 18px 16px;
    display: flex;
    flex-direction: column;

    transform: translateY(-100%);
    opacity: 0;
    will-change: transform, opacity;
  }

  .card.show {
    animation: slideDown 0.55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .card.hiding {
    animation: slideUp 0.38s cubic-bezier(0.65, 0, 0.85, 0.35) forwards;
  }

  @keyframes slideDown {
    0%   { transform: translateY(-100%); opacity: 0; }
    100% { transform: translateY(0);     opacity: 1; }
  }

  @keyframes slideUp {
    0%   { transform: translateY(0);     opacity: 1; }
    100% { transform: translateY(-100%); opacity: 0; }
  }

  .label {
    font-size: 9px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.4);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 10px;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
  }

  .options {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    flex: 1;
  }

  .option {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    padding: 1px;
    transition: transform 0.14s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .option:hover {
    transform: translateY(-2px);
  }

  .option:active {
    transform: scale(0.92);
    transition-duration: 0.08s;
  }

  .tile {
    width: 100%;
    aspect-ratio: 16 / 10;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 5px;
    transition: all 0.16s ease;
  }

  .option:hover .tile {
    background: rgba(180, 150, 255, 0.18);
    border-color: rgba(180, 150, 255, 0.5);
  }

  .tile svg {
    width: 100%;
    height: 100%;
  }

  .pane-fill {
    fill: rgba(255, 255, 255, 0.45);
    transition: fill 0.16s ease;
  }

  .option:hover .pane-fill {
    fill: rgba(210, 190, 255, 1);
  }

  .name {
    font-size: 9px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.55);
    letter-spacing: 0.03em;
    transition: color 0.16s ease;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
  }

  .option:hover .name {
    color: rgb(210, 190, 255);
  }
</style>
</head>
<body>

<div class="card" id="card">
  <div class="label">Arrange windows</div>

  <div class="options">

    <div class="option" onclick="pick('maximize')">
      <div class="tile">
        <svg viewBox="0 0 48 30" xmlns="http://www.w3.org/2000/svg">
          <rect class="pane-fill" x="2" y="2" width="44" height="26" rx="2"/>
        </svg>
      </div>
      <span class="name">Maximize</span>
    </div>

    <div class="option" onclick="pick('split')">
      <div class="tile">
        <svg viewBox="0 0 48 30" xmlns="http://www.w3.org/2000/svg">
          <rect class="pane-fill" x="2"  y="2" width="20" height="26" rx="2"/>
          <rect class="pane-fill" x="26" y="2" width="20" height="26" rx="2"/>
        </svg>
      </div>
      <span class="name">Split</span>
    </div>

    <div class="option" onclick="pick('grid')">
      <div class="tile">
        <svg viewBox="0 0 48 30" xmlns="http://www.w3.org/2000/svg">
          <rect class="pane-fill" x="2"  y="2"  width="20" height="12" rx="2"/>
          <rect class="pane-fill" x="26" y="2"  width="20" height="12" rx="2"/>
          <rect class="pane-fill" x="2"  y="16" width="20" height="12" rx="2"/>
          <rect class="pane-fill" x="26" y="16" width="20" height="12" rx="2"/>
        </svg>
      </div>
      <span class="name">Grid</span>
    </div>

    <div class="option" onclick="pick('stack')">
      <div class="tile">
        <svg viewBox="0 0 48 30" xmlns="http://www.w3.org/2000/svg">
          <rect class="pane-fill" x="2" y="2"  width="44" height="12" rx="2"/>
          <rect class="pane-fill" x="2" y="16" width="44" height="12" rx="2"/>
        </svg>
      </div>
      <span class="name">Stack</span>
    </div>

  </div>
</div>

<script>
  let _appNames = [];
  let _dismissTimer = null;

  function applyData(data) {
    _appNames = data.appNames || [];

    // Trigger animation
    const card = document.getElementById('card');
    card.classList.add('show');

    _dismissTimer = setTimeout(retract, 10000);
  }

  window.__applyArrangementData = applyData;

  // Direct testing fallback
  if (!window.__ARRANGEMENT_DATA__) {
    const p = new URLSearchParams(window.location.search);
    requestAnimationFrame(() => applyData({
      appNames: (p.get('apps') || '').split(',').filter(Boolean),
    }));
  }

  function pick(layout) {
    if (_dismissTimer) { clearTimeout(_dismissTimer); _dismissTimer = null; }

    fetch('http://127.0.0.1:7777/api/triggers/layout', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ layout, app_names: _appNames }),
    }).catch(() => {});

    retract();
  }

  function retract() {
    if (_dismissTimer) { clearTimeout(_dismissTimer); _dismissTimer = null; }
    const card = document.getElementById('card');
    if (card.classList.contains('hiding')) return;
    card.classList.remove('show');
    card.classList.add('hiding');
    setTimeout(() => {
      if (window.electronAPI && window.electronAPI.close) {
        window.electronAPI.close();
      }
    }, 400);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') retract();
  });
</script>
</body>
</html>
