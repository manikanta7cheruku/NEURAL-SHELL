<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="dark">
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 360px;
    height: 76px;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, 'Segoe UI Variable Display', 'SF Pro Display',
                 'Inter', 'Segoe UI', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  /*
     Windows acrylic provides real desktop blur beneath.
     CSS only adds tint + edge details on top.
  */
  .card {
    position: relative;
    width: 100%;
    height: 100%;

    /* Subtle dark tint layered on top of Windows acrylic */
    background:
      linear-gradient(
        135deg,
        rgba(20, 18, 30, 0.35) 0%,
        rgba(12, 10, 20, 0.55) 100%
      );

    /* Bottom-only rounded corners */
    border-radius: 0 0 18px 18px;

    /* Glass edge borders */
    border-left:   1px solid rgba(255, 255, 255, 0.07);
    border-right:  1px solid rgba(255, 255, 255, 0.07);
    border-bottom: 1px solid rgba(255, 255, 255, 0.10);

    padding: 14px 18px;
    display: flex;
    align-items: center;

    transform: translateY(-100%);
    opacity: 0;
    will-change: transform, opacity;
  }

  /* Top gradient — light catching on glass surface */
  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 50%;
    background: linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.06) 0%,
      transparent 100%
    );
    pointer-events: none;
  }

  /* Bottom edge glow */
  .card::after {
    content: '';
    position: absolute;
    left: 22%;
    right: 22%;
    bottom: 0;
    height: 1px;
    background: linear-gradient(
      90deg,
      transparent 0%,
      rgba(255, 255, 255, 0.22) 50%,
      transparent 100%
    );
    pointer-events: none;
  }

  .card.show {
    animation: slideDown 0.55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .card.hiding {
    animation: slideUp 0.4s cubic-bezier(0.55, 0, 0.85, 0.35) forwards;
  }

  @keyframes slideDown {
    0% { transform: translateY(-100%); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }

  @keyframes slideUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100%); opacity: 0; }
  }

  .accent-bar {
    width: 3px;
    height: 36px;
    background: linear-gradient(
      180deg,
      rgb(220, 195, 255) 0%,
      rgb(170, 135, 250) 50%,
      rgb(130, 95, 240) 100%
    );
    border-radius: 3px;
    margin-right: 14px;
    flex-shrink: 0;
    box-shadow:
      0 0 10px rgba(190, 160, 255, 0.85),
      0 0 24px rgba(180, 150, 255, 0.4),
      0 0 48px rgba(180, 150, 255, 0.18);
    position: relative;
    z-index: 2;
  }

  .text {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 3px;
    position: relative;
    z-index: 2;
  }

  .title {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.98);
    letter-spacing: -0.012em;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow:
      0 1px 3px rgba(0, 0, 0, 0.6),
      0 2px 8px rgba(0, 0, 0, 0.35);
  }

  .subtitle-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
  }

  .subtitle {
    color: rgba(255, 255, 255, 0.72);
    font-weight: 400;
    letter-spacing: -0.005em;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
  }

  .dot {
    width: 2.5px;
    height: 2.5px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.45);
    flex-shrink: 0;
    box-shadow: 0 0 4px rgba(255, 255, 255, 0.35);
  }

  .detail {
    color: rgb(215, 190, 255);
    font-weight: 500;
    letter-spacing: -0.005em;
    font-size: 10.5px;
    text-shadow:
      0 1px 3px rgba(0, 0, 0, 0.5),
      0 0 10px rgba(180, 150, 255, 0.4);
  }
</style>
</head>
<body>

<div class="card" id="card">
  <div class="accent-bar"></div>
  <div class="text">
    <div class="title" id="titleEl">Seven</div>
    <div class="subtitle-row">
      <span class="subtitle" id="subtitleEl"></span>
      <span class="dot" id="dotEl" style="display:none"></span>
      <span class="detail" id="detailEl" style="display:none"></span>
    </div>
  </div>
</div>

<script>
  let _timer = null;

  function applyData(data) {
    const { title = 'Seven', subtitle = '', detail = '', holdMs = 4500 } = data;

    if (_timer) { clearTimeout(_timer); _timer = null; }

    document.getElementById('titleEl').textContent = title;
    const subEl = document.getElementById('subtitleEl');
    subEl.textContent = subtitle;

    const detEl = document.getElementById('detailEl');
    const dotEl = document.getElementById('dotEl');
    if (detail) {
      detEl.textContent = detail;
      detEl.style.display = '';
      if (subtitle) dotEl.style.display = '';
    } else {
      detEl.style.display = 'none';
      dotEl.style.display = 'none';
    }

    const card = document.getElementById('card');
    card.classList.remove('show', 'hiding');
    void card.offsetWidth;
    card.classList.add('show');

    _timer = setTimeout(retract, holdMs);
  }

  window.__applyNotifData = applyData;

  if (!window.__NOTIF_DATA__) {
    const p = new URLSearchParams(window.location.search);
    if (p.get('title')) {
      requestAnimationFrame(() => applyData({
        title:    p.get('title')    || 'Seven',
        subtitle: p.get('subtitle') || '',
        detail:   p.get('detail')   || '',
        holdMs:   parseInt(p.get('holdMs') || '4500'),
      }));
    }
  }

  function retract() {
    if (_timer) { clearTimeout(_timer); _timer = null; }
    const card = document.getElementById('card');
    if (card.classList.contains('hiding')) return;
    card.classList.remove('show');
    card.classList.add('hiding');
    setTimeout(() => {
      if (window.electronAPI && window.electronAPI.close) {
        window.electronAPI.close();
      }
    }, 400);
  }
</script>
</body>
</html>
