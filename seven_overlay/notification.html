<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="dark">
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 380px;
    height: 96px;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, 'Segoe UI Variable Display', 'SF Pro Display',
                 'Inter', 'Segoe UI', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  /* 
     GLASSMORPHISM via pure CSS.
     No dependency on Windows acrylic (unreliable on Electron).
     - Semi-transparent dark tint
     - backdrop-filter blurs whatever desktop is behind
     - Edge highlights create glass slab illusion
  */
  .card {
    position: relative;
    width: 100%;
    height: 100%;

    /* Dark glass tint with subtle purple hint */
    background:
      linear-gradient(
        135deg,
        rgba(32, 28, 48, 0.55) 0%,
        rgba(22, 20, 36, 0.70) 50%,
        rgba(15, 13, 24, 0.75) 100%
      );

    /* THIS is what creates the glass effect */
    backdrop-filter: blur(28px) saturate(200%) brightness(1.05);
    -webkit-backdrop-filter: blur(28px) saturate(200%) brightness(1.05);

    /* Bottom-only rounded corners — top attaches to screen edge */
    border-radius: 0 0 22px 22px;

    /* Glass edges */
    border-left:   1px solid rgba(255, 255, 255, 0.10);
    border-right:  1px solid rgba(255, 255, 255, 0.10);
    border-bottom: 1px solid rgba(255, 255, 255, 0.14);

    padding: 18px 22px;
    display: flex;
    align-items: center;

    transform: translateY(-100%);
    opacity: 0;
    will-change: transform, opacity;

    /* Deep shadow makes it feel like it's floating above */
    box-shadow:
      0 24px 60px rgba(0, 0, 0, 0.55),
      0 8px 20px rgba(0, 0, 0, 0.35),
      inset 0 1px 0 rgba(255, 255, 255, 0.08);
  }

  /* Top-inside gradient — light catching on glass surface */
  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 60%;
    background: linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.08) 0%,
      rgba(255, 255, 255, 0.02) 50%,
      transparent 100%
    );
    pointer-events: none;
  }

  /* Bottom edge center glow */
  .card::after {
    content: '';
    position: absolute;
    left: 20%;
    right: 20%;
    bottom: 0;
    height: 1px;
    background: linear-gradient(
      90deg,
      transparent 0%,
      rgba(255, 255, 255, 0.3) 50%,
      transparent 100%
    );
    pointer-events: none;
  }

  .card.show {
    animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .card.hiding {
    animation: slideUp 0.45s cubic-bezier(0.55, 0, 0.85, 0.35) forwards;
  }

  @keyframes slideDown {
    0% { transform: translateY(-100%); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }

  @keyframes slideUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100%); opacity: 0; }
  }

  .accent-bar {
    width: 3px;
    height: 44px;
    background: linear-gradient(
      180deg,
      rgb(225, 200, 255) 0%,
      rgb(175, 140, 255) 50%,
      rgb(130, 95, 240) 100%
    );
    border-radius: 4px;
    margin-right: 18px;
    flex-shrink: 0;
    box-shadow:
      0 0 14px rgba(195, 165, 255, 0.9),
      0 0 32px rgba(180, 150, 255, 0.5),
      0 0 64px rgba(180, 150, 255, 0.25);
    position: relative;
    z-index: 2;
  }

  .text {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: relative;
    z-index: 2;
  }

  .title {
    font-size: 14px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.98);
    letter-spacing: -0.015em;
    line-height: 1.25;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow:
      0 1px 3px rgba(0, 0, 0, 0.65),
      0 2px 10px rgba(0, 0, 0, 0.4);
  }

  .subtitle-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    line-height: 1.25;
    white-space: nowrap;
    overflow: hidden;
  }

  .subtitle {
    color: rgba(255, 255, 255, 0.78);
    font-weight: 400;
    letter-spacing: -0.005em;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.55);
  }

  .dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.5);
    flex-shrink: 0;
    box-shadow: 0 0 5px rgba(255, 255, 255, 0.4);
  }

  .detail {
    color: rgb(220, 200, 255);
    font-weight: 500;
    letter-spacing: -0.005em;
    font-size: 11.5px;
    text-shadow:
      0 1px 3px rgba(0, 0, 0, 0.55),
      0 0 12px rgba(180, 150, 255, 0.45);
  }
</style>
</head>
<body>

<div class="card" id="card">
  <div class="accent-bar"></div>
  <div class="text">
    <div class="title" id="titleEl">Seven</div>
    <div class="subtitle-row">
      <span class="subtitle" id="subtitleEl"></span>
      <span class="dot" id="dotEl" style="display:none"></span>
      <span class="detail" id="detailEl" style="display:none"></span>
    </div>
  </div>
</div>

<script>
  let _timer = null;

  function applyData(data) {
    const { title = 'Seven', subtitle = '', detail = '', holdMs = 4500 } = data;

    if (_timer) { clearTimeout(_timer); _timer = null; }

    document.getElementById('titleEl').textContent = title;
    const subEl = document.getElementById('subtitleEl');
    subEl.textContent = subtitle;

    const detEl = document.getElementById('detailEl');
    const dotEl = document.getElementById('dotEl');
    if (detail) {
      detEl.textContent = detail;
      detEl.style.display = '';
      if (subtitle) dotEl.style.display = '';
    } else {
      detEl.style.display = 'none';
      dotEl.style.display = 'none';
    }

    const card = document.getElementById('card');
    card.classList.remove('show', 'hiding');
    void card.offsetWidth;
    card.classList.add('show');

    _timer = setTimeout(retract, holdMs);
  }

  window.__applyNotifData = applyData;

  if (!window.__NOTIF_DATA__) {
    const p = new URLSearchParams(window.location.search);
    if (p.get('title')) {
      requestAnimationFrame(() => applyData({
        title:    p.get('title')    || 'Seven',
        subtitle: p.get('subtitle') || '',
        detail:   p.get('detail')   || '',
        holdMs:   parseInt(p.get('holdMs') || '4500'),
      }));
    }
  }

  function retract() {
    if (_timer) { clearTimeout(_timer); _timer = null; }
    const card = document.getElementById('card');
    if (card.classList.contains('hiding')) return;
    card.classList.remove('show');
    card.classList.add('hiding');
    setTimeout(() => {
      if (window.electronAPI && window.electronAPI.close) {
        window.electronAPI.close();
      }
    }, 450);
  }
</script>
</body>
</html>
