<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    overflow: hidden;
    font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }

  #card {
    position: fixed;
    bottom: 16px;
    right: 16px;
    width: 340px;
    background: rgba(14, 14, 18, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 14px;
    padding: 16px 18px;
    transform: translateY(120%) scale(0.96);
    opacity: 0;
    transition: transform 420ms cubic-bezier(0.16, 1, 0.3, 1),
                opacity 320ms ease-out;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.03);
  }

  #card.show {
    transform: translateY(0) scale(1);
    opacity: 1;
  }

  #card.hiding {
    transform: translateY(30%) scale(0.98);
    opacity: 0;
    transition: transform 350ms cubic-bezier(0.4, 0, 1, 1),
                opacity 250ms ease-in;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .icon-wrap {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .icon-wrap svg {
    width: 14px;
    height: 14px;
    stroke: rgba(255, 255, 255, 0.45);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .header-text {
    flex: 1;
    min-width: 0;
  }

  .app-name {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.25);
    line-height: 1;
  }

  .type-label {
    font-size: 11px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.7);
    margin-top: 3px;
    line-height: 1;
  }

  .timestamp {
    font-size: 9px;
    color: rgba(255, 255, 255, 0.2);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
    align-self: flex-start;
    margin-top: 2px;
    margin-right: 22px;
  }

  .message {
    font-size: 12.5px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.6);
    line-height: 1.55;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }

  .progress-track {
    margin-top: 12px;
    width: 100%;
    height: 2px;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 1px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: rgba(255, 255, 255, 0.12);
    border-radius: 1px;
    width: 100%;
    transform-origin: left;
    transition: none;
  }

  .progress-bar.running {
    transition: transform linear;
    transform: scaleX(0);
  }

  .dismiss-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 1px solid rgba(255, 255, 255, 0.06);
    background: rgba(255, 255, 255, 0.04);
    color: rgba(255, 255, 255, 0.2);
    font-size: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 150ms, background 150ms, color 150ms;
    z-index: 10;
  }

  #card:hover .dismiss-btn {
    opacity: 1;
  }

  .dismiss-btn:hover {
    background: rgba(255, 255, 255, 0.08);
    color: rgba(255, 255, 255, 0.5);
  }
</style>
</head>
<body>

<div id="card">
  <button class="dismiss-btn" onclick="dismiss()">&#x2715;</button>

  <div class="header">
    <div class="icon-wrap">
      <svg id="icon-bell" viewBox="0 0 24 24">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
    </div>
    <div class="header-text">
      <div class="app-name">SEVEN</div>
      <div class="type-label" id="type-label">Reminder</div>
    </div>
    <div class="timestamp" id="timestamp"></div>
  </div>

  <div class="message" id="message"></div>

  <div class="progress-track">
    <div class="progress-bar" id="progress"></div>
  </div>
</div>

<script>
  let hideTimer = null;
  let holdMs = 8000;

  function applyData(data) {
    const card    = document.getElementById('card');
    const label   = document.getElementById('type-label');
    const msg     = document.getElementById('message');
    const ts      = document.getElementById('timestamp');
    const prog    = document.getElementById('progress');

    // Set content
    const types = {
      alarm:    'Alarm',
      reminder: 'Reminder',
      timer:    'Timer',
      event:    'Event',
    };
    label.textContent = types[data.type] || 'Reminder';
    msg.textContent   = data.message || '';
    holdMs            = data.holdMs || 8000;

    // Timestamp
    const now = new Date();
    ts.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    // Reset animation
    card.classList.remove('show', 'hiding');
    prog.classList.remove('running');
    prog.style.transform = 'scaleX(1)';
    void card.offsetWidth;

    // Show
    card.classList.add('show');

    // Start progress bar countdown
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        prog.classList.add('running');
        prog.style.transitionDuration = holdMs + 'ms';
        prog.style.transform = 'scaleX(0)';
      });
    });

    // Schedule auto-dismiss
    if (hideTimer) clearTimeout(hideTimer);
    hideTimer = setTimeout(() => dismiss(), holdMs);
  }

  function dismiss() {
    if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
    const card = document.getElementById('card');
    card.classList.add('hiding');
    card.classList.remove('show');
    setTimeout(() => {
      try { window.__electron__.send('overlay-close'); } catch(e) {}
    }, 400);
  }

  // Play notification sound
  function playSound() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      // Two-tone chime: C5 then E5
      const now = ctx.currentTime;

      function tone(freq, start, dur) {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.15, start);
        gain.gain.exponentialRampToValueAtTime(0.001, start + dur);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(start);
        osc.stop(start + dur);
      }

      tone(523.25, now, 0.25);       // C5
      tone(659.25, now + 0.15, 0.3); // E5
    } catch(e) {}
  }

  // Expose for overlay_daemon.js injection
  window.__applyScheduleData = function(data) {
    applyData(data);
    playSound();
  };
</script>

</body>
</html>
