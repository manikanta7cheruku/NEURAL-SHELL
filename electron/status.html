<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>VII</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; }

    html, body {
      width: 420px;
      height: 80px;
      background: transparent !important;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    /* ══════════════════════════════════════
       CONVERSATION PANEL
    ══════════════════════════════════════ */
    #conv-panel {
      flex: 1;
      height: 72px;
      margin-right: 10px;
      border-radius: 14px;
      opacity: 0;
      /* Slides RIGHT to hide (toward orb), slides LEFT to show */
      transform: translateX(20px);
      transition:
        opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1),
        transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
      overflow: hidden;
      background: rgba(8, 8, 12, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.055);
      box-shadow:
        0 12px 40px rgba(0,0,0,0.55),
        0 2px 8px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.035);
    }

    /* Panel visible — slides LEFT into view */
    #conv-panel.visible {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    /* Panel hiding — slides RIGHT back toward orb */
    #conv-panel.hiding {
      opacity: 0;
      transform: translateX(20px);
      pointer-events: none;
    }

    /* ── Scroll area ── */
    #conv-scroll {
      height: 100%;
      overflow-y: auto;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      scroll-behavior: smooth;
    }

    /* Minimal professional scrollbar */
    #conv-scroll::-webkit-scrollbar { width: 2px; }
    #conv-scroll::-webkit-scrollbar-track { background: transparent; }
    #conv-scroll::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.08);
      border-radius: 1px;
    }
    #conv-scroll::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.18);
    }

    /* ── History entries ── */
    .hist-user {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      flex-shrink: 0;
    }

    .hist-user-label {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 7.5px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.18);
      flex-shrink: 0;
      width: 20px;
      padding-top: 1px;
    }

    .hist-user-text {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 10px;
      color: rgba(255,255,255,0.32);
      font-weight: 400;
      line-height: 1.4;
      flex: 1;
    }

    .hist-seven {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      flex-shrink: 0;
    }

    .hist-seven-label {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 7.5px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(99,102,241,0.45);
      flex-shrink: 0;
      width: 20px;
      padding-top: 1px;
      transition: color 0.4s ease;
    }

    .hist-seven-text {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      font-weight: 300;
      line-height: 1.55;
      letter-spacing: 0.01em;
      flex: 1;
    }

    .hist-sep {
      height: 1px;
      background: linear-gradient(
        90deg, transparent,
        rgba(255,255,255,0.04) 30%,
        rgba(255,255,255,0.04) 70%,
        transparent
      );
      flex-shrink: 0;
      margin: 1px 0;
    }

    /* ── Current (live) seven text ── */
    #live-seven-text {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 11px;
      color: rgba(255,255,255,0.88);
      font-weight: 300;
      line-height: 1.55;
      letter-spacing: 0.01em;
      flex: 1;
    }

    /* Thinking dots */
    #thinking {
      display: none;
      align-items: center;
      gap: 3px;
      padding: 3px 0;
    }
    #thinking span {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: rgba(168,85,247,0.7);
      display: inline-block;
    }
    #thinking span:nth-child(1) { animation: tBounce 1.2s ease-in-out 0.0s infinite; }
    #thinking span:nth-child(2) { animation: tBounce 1.2s ease-in-out 0.15s infinite; }
    #thinking span:nth-child(3) { animation: tBounce 1.2s ease-in-out 0.30s infinite; }

    /* Cursor */
    .cursor-blink {
      display: inline-block;
      width: 1.5px; height: 11px;
      background: #6366f1;
      margin-left: 2px;
      vertical-align: middle;
      border-radius: 1px;
      animation: cursorBlink 0.9s ease-in-out infinite;
    }

    /* ══════════════════════════════════════
       ORB
    ══════════════════════════════════════ */
    #orb-container {
      width: 80px; height: 80px;
      flex-shrink: 0;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #orb {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: radial-gradient(ellipse at 35% 30%, #1a1a2e 0%, #12121c 40%, #0a0a12 100%);
      border: 1px solid rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 3;
      transition: border-color 0.6s ease, transform 0.12s ease;
      pointer-events: none;
    }

    #orb::before {
      content: '';
      position: absolute;
      top: 4px; left: 8px;
      width: 18px; height: 8px;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.07) 0%, transparent 100%);
      z-index: 5;
    }

    #orb-text {
      font-family: 'Georgia', serif;
      font-size: 11px;
      font-weight: bold;
      color: rgba(255,255,255,0.35);
      letter-spacing: 2px;
      z-index: 4;
      transition: color 0.6s ease, text-shadow 0.6s ease;
    }

    #orb-glow {
      position: absolute;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:42px; height:42px;
      border-radius:50%;
      pointer-events:none;
      z-index:0;
      transition:box-shadow 0.8s ease;
    }

    #pulse-ring {
      position: absolute;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:50px; height:50px;
      border-radius:50%;
      border:1.5px solid transparent;
      pointer-events:none;
      z-index:1;
      transition:border-color 0.6s ease;
    }

    #ghost-ring {
      position: absolute;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:50px; height:50px;
      border-radius:50%;
      border:1px solid transparent;
      pointer-events:none;
      z-index:0;
      opacity:0;
    }

    #interaction-layer {
      position: absolute;
      top:0; left:0;
      width:80px; height:80px;
      z-index:10;
      cursor:grab;
      border-radius:50%;
    }
    #interaction-layer:active { cursor:grabbing; }

    #tooltip {
      position:fixed;
      top:-26px; left:50%;
      transform:translateX(-50%);
      background:#0e0e18;
      color:rgba(255,255,255,0.4);
      padding:3px 10px;
      border-radius:3px;
      border:1px solid rgba(255,255,255,0.04);
      font-family:'Segoe UI',system-ui,sans-serif;
      font-size:9px; font-weight:600;
      letter-spacing:1.2px;
      text-transform:uppercase;
      white-space:nowrap;
      opacity:0;
      pointer-events:none;
      transition:opacity 0.15s ease;
      z-index:100;
    }
    #orb-container:hover #tooltip { opacity:1; }

    /* ── State classes ── */
    .idle     #orb        { border-color:rgba(40,40,55,0.3); }
    .idle     #orb-text   { color:rgba(255,255,255,0.2); }
    .idle     #orb-glow   { box-shadow:0 0 8px rgba(40,40,60,0.08); }
    .idle     #pulse-ring { border-color:rgba(40,40,60,0.08); }

    .listening #orb        { border-color:rgba(34,197,94,0.1); }
    .listening #orb-text   { color:rgba(255,255,255,0.45); text-shadow:0 0 8px rgba(34,197,94,0.15); }
    .listening #orb-glow   { box-shadow:0 0 20px rgba(34,197,94,0.12),0 0 40px rgba(34,197,94,0.06); }
    .listening #pulse-ring { border-color:rgba(34,197,94,0.4); animation:pulse 2.4s cubic-bezier(0.4,0,0.2,1) infinite; }
    .listening #ghost-ring { border-color:rgba(34,197,94,0.15); opacity:1; animation:pulse 2.4s cubic-bezier(0.4,0,0.2,1) infinite 0.6s; }

    .thinking #orb        { border-color:rgba(168,85,247,0.1); }
    .thinking #orb-text   { color:rgba(255,255,255,0.45); text-shadow:0 0 8px rgba(168,85,247,0.15); }
    .thinking #orb-glow   { box-shadow:0 0 22px rgba(168,85,247,0.15),0 0 40px rgba(168,85,247,0.06); }
    .thinking #pulse-ring { border-color:rgba(168,85,247,0.4); border-style:dashed; border-width:1.5px; animation:spin 2s linear infinite; }

    .speaking #orb        { border-color:rgba(99,102,241,0.15); }
    .speaking #orb-text   { color:rgba(255,255,255,0.45); text-shadow:0 0 8px rgba(99,102,241,0.2); }
    .speaking #orb-glow   { box-shadow:0 0 20px rgba(99,102,241,0.15),0 0 40px rgba(99,102,241,0.07); }
    .speaking #pulse-ring { border-color:rgba(99,102,241,0.4); animation:breathe 1s ease-in-out infinite; }
    .speaking #ghost-ring { border-color:rgba(99,102,241,0.12); opacity:1; animation:breathe 1s ease-in-out infinite 0.2s; }

    /* ── Animations ── */
    @keyframes pulse {
      0%   { transform:translate(-50%,-50%) scale(1); opacity:0.6; }
      70%  { transform:translate(-50%,-50%) scale(1.35); opacity:0; }
      100% { transform:translate(-50%,-50%) scale(1.35); opacity:0; }
    }
    @keyframes spin {
      from { transform:translate(-50%,-50%) rotate(0deg); }
      to   { transform:translate(-50%,-50%) rotate(360deg); }
    }
    @keyframes breathe {
      0%,100% { transform:translate(-50%,-50%) scale(1); opacity:0.5; }
      50%     { transform:translate(-50%,-50%) scale(1.12); opacity:0.25; }
    }
    @keyframes tBounce {
      0%,80%,100% { transform:scale(0.6); opacity:0.4; }
      40%         { transform:scale(1); opacity:1; }
    }
    @keyframes cursorBlink {
      0%,45%   { opacity:1; }
      55%,100% { opacity:0; }
    }
  </style>
</head>
<body class="listening">

  <div id="conv-panel">
    <div id="conv-scroll" id="conv-scroll">
      <!-- History entries injected here by JS -->
      <!-- Current live row always at bottom -->
      <div id="live-user-row" class="hist-user" style="display:none">
        <span class="hist-user-label">You</span>
        <span id="live-user-text" class="hist-user-text"></span>
      </div>
      <div id="live-sep" class="hist-sep" style="display:none"></div>
      <div id="live-seven-row" class="hist-seven" style="display:none">
        <span id="live-seven-label" class="hist-seven-label">VII</span>
        <div style="flex:1;overflow:hidden">
          <div id="thinking"><span></span><span></span><span></span></div>
          <span id="live-seven-text" class="hist-seven-text"></span>
        </div>
      </div>
    </div>
  </div>

  <div id="orb-container">
    <div id="orb-glow"></div>
    <div id="ghost-ring"></div>
    <div id="pulse-ring"></div>
    <div id="orb"><span id="orb-text">VII</span></div>
    <div id="interaction-layer"></div>
    <div id="tooltip">Listening</div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════
    // CONFIGURATION — Change these values to customize
    // ═══════════════════════════════════════════════════
    const HIDE_DELAY_MS     = 5000;  // How long panel stays after Seven finishes (ms)
                                      // 4000 = 4 seconds, 7000 = 7 seconds
    const SHOW_ANIM_MS      = 500;   // Slide-in animation duration (matches CSS)
    const MAX_HISTORY       = 6;     // Max past exchanges shown (each = 1 user + 1 seven)
    // ═══════════════════════════════════════════════════

    const body          = document.body;
    const convPanel     = document.getElementById('conv-panel');
    const convScroll    = document.getElementById('conv-scroll');
    const liveUserRow   = document.getElementById('live-user-row');
    const liveUserText  = document.getElementById('live-user-text');
    const liveSep       = document.getElementById('live-sep');
    const liveSevenRow  = document.getElementById('live-seven-row');
    const liveSevenText = document.getElementById('live-seven-text');
    const thinkingEl    = document.getElementById('thinking');
    const tooltip       = document.getElementById('tooltip');
    const iLayer        = document.getElementById('interaction-layer');

    let currentStatus  = 'listening';
    let ws             = null;
    let reconnects     = 0;
    let hideTimer      = null;
    let panelVisible   = false;

    // Conversation state tracking
    let lastUserText   = '';
    let lastSevenText  = '';
    let wasActive      = false; // true if panel was shown this exchange
    let exchangeDone   = false; // true when seven finished speaking

    // History: array of { user, seven }
    const history = [];

    const statusLabels = {
      idle: 'Offline', listening: 'Listening',
      thinking: 'Processing', speaking: 'Speaking'
    };

    // ── Show panel (slide LEFT into view) ──
    function showPanel() {
      if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
      convPanel.classList.remove('hiding');
      convPanel.classList.add('visible');
      panelVisible = true;
    }

    // ── Hide panel (slide RIGHT back toward orb) ──
    function hidePanel() {
      convPanel.classList.remove('visible');
      convPanel.classList.add('hiding');
      panelVisible = false;
    }

    // ── Schedule hide after delay ──
    function scheduleHide() {
      if (hideTimer) clearTimeout(hideTimer);
      hideTimer = setTimeout(() => {
        hidePanel();
        hideTimer = null;
      }, HIDE_DELAY_MS);
    }

    // ── Smooth scroll to bottom ──
    function scrollToBottom() {
      convScroll.scrollTo({
        top: convScroll.scrollHeight,
        behavior: 'smooth'
      });
    }

    // ── Save completed exchange to history ──
    function archiveCurrentExchange() {
      if (!lastUserText && !lastSevenText) return;
      history.push({
        user:  lastUserText,
        seven: lastSevenText,
      });
      // Keep only MAX_HISTORY entries
      while (history.length > MAX_HISTORY) {
        history.shift();
      }
      renderHistory();
    }

    // ── Render past history above live row ──
    function renderHistory() {
      // Remove old history elements
      const old = convScroll.querySelectorAll('.hist-entry');
      old.forEach(el => el.remove());

      // Insert before the live rows
      const anchor = liveUserRow;
      history.forEach(entry => {
        const frag = document.createDocumentFragment();

        if (entry.user) {
          const uRow = document.createElement('div');
          uRow.className = 'hist-user hist-entry';
          uRow.style.opacity = '0.55';
          uRow.innerHTML = `
            <span class="hist-user-label">You</span>
            <span class="hist-user-text">${entry.user}</span>
          `;
          frag.appendChild(uRow);
        }

        if (entry.seven) {
          const sRow = document.createElement('div');
          sRow.className = 'hist-seven hist-entry';
          sRow.style.opacity = '0.55';
          sRow.innerHTML = `
            <span class="hist-seven-label">VII</span>
            <span class="hist-seven-text">${entry.seven}</span>
          `;
          frag.appendChild(sRow);

          const sep = document.createElement('div');
          sep.className = 'hist-sep hist-entry';
          frag.appendChild(sep);
        }

        convScroll.insertBefore(frag, anchor);
      });

      scrollToBottom();
    }

    // ── Main update function ──
    function updateConversation(userText, sevenText, isThinking, isSpeaking) {
      const hasContent = userText || sevenText || isThinking;

      // ── NEW EXCHANGE STARTED ──
      // User spoke something new
      if (userText && userText !== lastUserText) {
        // Archive the previous exchange before starting new one
        if (lastUserText || lastSevenText) {
          archiveCurrentExchange();
          lastUserText  = '';
          lastSevenText = '';
        }
        lastUserText = userText;
        exchangeDone = false;

        // Show user line
        liveUserText.textContent      = userText;
        liveUserRow.style.display     = 'flex';
        liveSep.style.display         = 'block';
        liveSevenText.textContent     = '';
        liveSevenRow.style.display    = 'none';
        thinkingEl.style.display      = 'none';

        showPanel();
        wasActive = true;
      }

      // ── THINKING STATE ──
      if (isThinking && !sevenText) {
        liveSevenRow.style.display = 'flex';
        thinkingEl.style.display   = 'flex';
        liveSevenText.textContent  = '';
        removeOldCursor();
        showPanel();
      }

      // ── SEVEN IS SPEAKING / HAS RESPONSE ──
      if (sevenText && sevenText !== lastSevenText) {
        lastSevenText = sevenText;

        thinkingEl.style.display   = 'none';
        liveSevenRow.style.display = 'flex';
        liveSevenText.textContent  = sevenText;

        // Add blinking cursor while speaking
        removeOldCursor();
        if (isSpeaking) {
          const cur = document.createElement('span');
          cur.className = 'cursor-blink';
          cur.id        = 'active-cursor';
          liveSevenText.appendChild(cur);
        }

        scrollToBottom();
        showPanel();
      }

      // ── CURSOR: remove when done speaking ──
      if (!isSpeaking) {
        removeOldCursor();
      }

      // ── ALL DONE — schedule hide ──
      if (!isThinking && !isSpeaking && wasActive && sevenText && !exchangeDone) {
        exchangeDone = true;
        scheduleHide();
      }

      // ── NOTHING HAPPENING — hide quickly ──
      if (!hasContent && panelVisible && !hideTimer) {
        scheduleHide();
      }
    }

    function removeOldCursor() {
      const old = document.getElementById('active-cursor');
      if (old) old.remove();
    }

    // ── WebSocket ──
    function connect() {
      if (reconnects > 80) return;
      try {
        ws = new WebSocket('ws://127.0.0.1:7777/ws/status');

        ws.onopen = () => {
          reconnects = 0;
          setStatus('listening');
        };

        ws.onmessage = (e) => {
          try {
            const d = JSON.parse(e.data);
            let s = 'idle';
            if      (d.speaking)  s = 'speaking';
            else if (d.thinking)  s = 'thinking';
            else if (d.listening) s = 'listening';
            setStatus(s);
            updateConversation(
              d.user_text  || '',
              d.seven_text || '',
              !!d.thinking,
              !!d.speaking
            );
          } catch {}
        };

        ws.onclose = () => { reconnects++; setTimeout(connect, 2000); };
        ws.onerror = () => ws && ws.close();
      } catch {
        reconnects++;
        setTimeout(connect, 2000);
      }
    }

    function setStatus(s) {
      if (currentStatus === s) return;
      currentStatus = s;
      body.className = s;
      tooltip.textContent = statusLabels[s] || '';
    }

    // ── Drag + click ──
    let isDown = false, startX = 0, startY = 0, dragged = false;
    const THRESH = 5;

    iLayer.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      isDown = true; dragged = false;
      startX = e.screenX; startY = e.screenY;
      window.orbAPI?.dragStart(e.screenX, e.screenY);
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDown) return;
      if (Math.abs(e.screenX-startX) > THRESH || Math.abs(e.screenY-startY) > THRESH)
        dragged = true;
      window.orbAPI?.dragMove(e.screenX, e.screenY);
    });

    document.addEventListener('mouseup', (e) => {
      if (!isDown) return;
      isDown = false;
      if (e.button === 0 && !dragged) window.orbAPI?.toggleDashboard();
    });

    iLayer.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      window.orbAPI?.showMenu();
    });

    // ── Click-through transparent areas ──
    document.addEventListener('mousemove', (e) => {
      const el = document.elementFromPoint(e.clientX, e.clientY);
      const onOrb   = el && ['interaction-layer','orb','orb-text','orb-container'].includes(el.id);
      const onPanel = el && (el === convPanel || convPanel.contains(el));
      window.orbAPI?.setIgnoreMouseEvents(!(onOrb || onPanel));
    });

    document.addEventListener('mouseleave', () => {
      window.orbAPI?.setIgnoreMouseEvents(true);
    });

    setStatus('listening');
    setTimeout(connect, 1200);
  </script>
</body>
</html>
